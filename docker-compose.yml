services:
  db:
    # Свой образ: postgres:16 + pgvector (docker/postgres/Dockerfile). FROM
    # postgres:16 → glibc как у прод-тома (Debian 13) → нет collation-mismatch,
    # REINDEX не нужен. deploy.yml `up -d --build` пересоберёт db автоматически.
    build:
      context: docker/postgres
    container_name: nexus-arcana-db
    environment:
      POSTGRES_USER: kai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localdevpass}
      POSTGRES_DB: nexus_arcana
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kai -d nexus_arcana"]
      interval: 10s
      timeout: 5s
      retries: 5

  nexus:
    # GIT_SHA — короткий хэш коммита для старт-пинга версии. Если deploy не
    # передал (forced-command не прокидывает env) → пусто, стамп = время сборки.
    build:
      context: .
      args:
        GIT_SHA: ${GIT_SHA:-}
    image: nexus-arcana-bots
    container_name: nexus-bot
    command: ["python", "-m", "nexus.nexus_bot"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # heartbeat: unhealthy если /tmp/heartbeat протух (процесс завис/умер).
    # $$ → литеральный $ после compose-интерполяции.
    healthcheck:
      test: ["CMD-SHELL", "test $$(( $$(date +%s) - $$(cat /tmp/heartbeat) )) -lt 90"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  arcana:
    build:
      context: .
      args:
        GIT_SHA: ${GIT_SHA:-}
    image: nexus-arcana-bots
    container_name: arcana-bot
    command: ["python", "-m", "arcana.bot"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    # heartbeat: unhealthy если /tmp/heartbeat протух (процесс завис/умер).
    # $$ → литеральный $ после compose-интерполяции.
    healthcheck:
      test: ["CMD-SHELL", "test $$(( $$(date +%s) - $$(cat /tmp/heartbeat) )) -lt 90"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  pgdata:
