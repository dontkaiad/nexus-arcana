name: Deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        id: deploy
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: "20m"
          # Сервер использует forced command (~/.ssh/authorized_keys:
          # command="/home/kai/deploy.sh") → ЭТОТ script игнорируется, всегда
          # гоняется deploy.sh. ssh-action к тому же глотает exit-код. Детект
          # фейла — снаружи (Verify) по маркеру deploy.sh «deploy done», который
          # печатается ПОСЛЕДНЕЙ строкой только при успехе (set -euo pipefail).
          # capture_stdout кладёт вывод в steps.deploy.outputs.stdout для Verify.
          capture_stdout: true
          script: |
            # Forced command in authorized_keys runs /home/kai/deploy.sh; script body ignored. See ADR-0014.

      - name: Verify deploy marker
        if: always()
        env:
          OUT: ${{ steps.deploy.outputs.stdout }}
        run: |
          echo "$OUT"
          echo "$OUT" | grep -q "deploy done" || { echo "marker missing — deploy failed"; exit 1; }

      - name: Notify Telegram on failure
        if: failure()
        run: |
          send() {
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_LOG_BOT_TOKEN }}/sendMessage" \
              --data-urlencode "chat_id=${{ secrets.TG_LOG_CHAT_ID }}" \
              --data-urlencode "message_thread_id=$1" \
              --data-urlencode "parse_mode=HTML" \
              --data-urlencode "text=❌ <b>Деплой упал</b>
          commit: <code>${{ github.sha }}</code>
          автор: ${{ github.actor }}
          <a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">открыть run</a>"
          }
          send "${{ secrets.TG_LOG_THREAD_NEXUS }}"
          send "${{ secrets.TG_LOG_THREAD_ARCANA }}"
