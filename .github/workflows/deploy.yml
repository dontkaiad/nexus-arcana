name: Deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: "10m"
          # Падение на ошибке в v1.2.5 — через set -e в скрипте (инпут
          # script_stop в этой версии убран). set -e роняет шаг при non-zero
          # от команды → if: failure() → Telegram-алерт.
          script: |
            set -e
            cd ~/nexus-arcana
            git pull origin main
            docker compose up -d --build
            docker compose ps

      - name: Notify Telegram on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_LOG_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TG_LOG_CHAT_ID }}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "text=❌ <b>Деплой упал</b>
          commit: <code>${{ github.sha }}</code>
          автор: ${{ github.actor }}
          <a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">открыть run</a>"
