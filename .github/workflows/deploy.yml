name: Deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        id: deploy
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: "10m"
          # ssh-action@v1.2.5 ГЛОТАЕТ exit-код удалённого скрипта (доказано:
          # exit 1 / script_stop / false — все оставляли шаг green). Поэтому
          # детект фейла — снаружи, по success-маркеру в captured stdout: под
          # set -e упавшая команда останавливает скрипт ДО echo "DEPLOY_OK".
          capture_stdout: true
          script: |
            set -e
            cd ~/nexus-arcana
            git pull origin main
            docker compose up -d --build
            docker compose ps
            echo "DEPLOY_OK"

      - name: Verify deploy marker
        if: always()
        run: |
          echo "${{ steps.deploy.outputs.stdout }}"
          echo "${{ steps.deploy.outputs.stdout }}" | grep -q "DEPLOY_OK" || { echo "marker missing — deploy failed"; exit 1; }

      - name: Notify Telegram on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TG_LOG_BOT_TOKEN }}/sendMessage" \
            --data-urlencode "chat_id=${{ secrets.TG_LOG_CHAT_ID }}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "text=❌ <b>Деплой упал</b>
          commit: <code>${{ github.sha }}</code>
          автор: ${{ github.actor }}
          <a href=\"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\">открыть run</a>"
